<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Builder | Yousef Botros</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="card" id="main-card">
        <h2>Build Your Identity</h2>
        <div class="inputs">
            <div class="input-box">
                <input type="text" id="name" placeholder="Full Name">
                <i class="fas fa-user"></i>
            </div>
            <div class="input-box">
                <input type="text" id="fb" placeholder="Facebook Link">
                <i class="fab fa-facebook"></i>
            </div>
            <div class="input-box">
                <input type="text" id="ig" placeholder="Instagram ID">
                <i class="fab fa-instagram"></i>
            </div>
            <div class="input-box">
                <input type="text" id="ln" placeholder="LinkedIn URL">
                <i class="fab fa-linkedin"></i>
            </div>
            <div class="input-box">
                <input type="text" id="wa" placeholder="WhatsApp Number">
                <i class="fab fa-whatsapp"></i>
            </div>

            <div class="photo-actions">
                <label for="photo" class="upload-btn">
                    <i class="fas fa-camera"></i>
                    <span id="upText">Upload Identity Photo</span>
                </label>
                <button id="delete-photo" class="delete-btn" title="Remove Photo" type="button">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>

            <input type="file" id="photo" hidden accept="image/*">
        </div>

        <button class="main-btn" onclick="generate()">Generate Experience</button>
    </div>

    <div id="result-area" style="display: none;">
        <div class="profile-card" id="profile-preview-card">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar">
                    <img id="profile-img" src="" alt="Profile Photo">
                </div>
            </div>

            <h1 class="profile-name" id="display-name" data-text=""></h1>

            <div class="social-links" id="social-container">
                <a id="link-fb" href="#" target="_blank" style="display: none;"><i class="fab fa-facebook"></i></a>
                <a id="link-ig" href="#" target="_blank" style="display: none;"><i class="fab fa-instagram"></i></a>
                <a id="link-ln" href="#" target="_blank" style="display: none;"><i class="fab fa-linkedin"></i></a>
                <a id="link-wa" href="#" target="_blank" style="display: none;"><i class="fab fa-whatsapp"></i></a>
            </div>

            <div id="qrcode"></div>

            <div class="action-buttons" style="display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 20px;">
                <button class="main-btn" id="copy-btn" onclick="copyProfileLink()">
                    <i class="fas fa-copy"></i> <span id="copyText">Copy Profile Link</span>
                </button>

                <button class="main-btn edit-btn" onclick="location.href=window.location.pathname" style="background: rgba(255,255,255,0.05);">
                    <i class="fas fa-edit"></i> Create New Card
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
